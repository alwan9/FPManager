<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Kelola ProjekBareng</title>
  <!-- Tailwind CSS v2 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body
  class="bg-gradient-to-br from-indigo-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">

  <!-- Glassmorphic Login Container -->
  <div
    class="glass-panel w-full max-w-md p-8 rounded-2xl shadow-2xl flex flex-col justify-center border border-white border-opacity-10 text-white">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg mb-4">
        <i class="fa-solid fa-folder-open text-3xl"></i>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight">ProjekBareng</h1>
      <p class="text-slate-300 mt-2 text-sm">Masuk untuk mengelola proyek dan laporan keuangan</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-6">
      <div>
        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password Admin</label>
        <div class="relative rounded-md shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-lock text-slate-400"></i>
          </div>
          <input type="password" name="password" id="password" required
            class="block w-full pl-10 pr-10 py-3 bg-slate-800 bg-opacity-50 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-slate-500 text-sm transition-all"
            placeholder="Masukkan password admin">
          <button type="button" id="togglePassword"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-white transition-colors">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Error Alert -->
      <div id="errorAlert"
        class="hidden flex items-center p-4 bg-red-900 bg-opacity-50 border border-red-500 rounded-xl text-red-200 text-sm">
        <i class="fa-solid fa-circle-exclamation mr-2 text-base"></i>
        <span id="errorMessage">Password admin salah!</span>
      </div>

      <div>
        <button type="submit"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 rounded-xl font-semibold text-white shadow-lg transform transition hover:-translate-y-0.5 active:translate-y-0 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-indigo-500 text-sm">
          Masuk ke Dashboard
        </button>
      </div>
    </form>

    <div class="text-center mt-8 text-xs text-slate-400">
      &copy; 2026 Kelola ProjekBareng. All rights reserved.
    </div>
  </div>

  <!-- Load Config & Auth Script -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Toggle Password Visibility
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePasswordBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      eyeIcon.classList.toggle('fa-eye');
      eyeIcon.classList.toggle('fa-eye-slash');
    });

    // Form Submit
    const loginForm = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.classList.add('hidden');

      const password = passwordInput.value;
      const result = await Auth.login(password);

      if (result.success) {
        // Redirection handled by Auth.checkLogin or immediate window.location change
        window.location.href = 'index.html';
      } else {
        errorMessage.textContent = result.message;
        errorAlert.classList.remove('hidden');
      }
    });
  </script>
</body>

</html>
