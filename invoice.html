        #invoiceArea {

            top: -10%;
            left: -10%;
            right: -10%;
            bottom: -10%;
            background-repeat: repeat;
            background-size: 180px 150px;

            <button id="btnResetInvoice" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-4 rounded-lg font-semibold flex items-center justify-center">

            </button>
