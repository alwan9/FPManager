<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - FPManager</title>
    <!-- meta infoemasi -->
    <meta name="title" content="FPM - Freelance Project Manager - by Alwan">
    <meta name="description"
        content="FPManager adalah aplikasi manajemen projek freelance untuk membantu mengelola pelanggan, projek, invoice, pembayaran, deadline, dan laporan keuangan secara mudah dan efisien.">
    <meta name="keywords"
        content=" Freelance, Project Manager, Invoice, Keuangan, Manajemen Proyek, Pelanggan, Dashboard, Web App, JavaScript">
    <meta name="author" content="Alwan">
    <meta name="robots" content="index, follow">
    <meta name="language" content="Indonesian">
    <meta name="theme-color" content="#2563EB">
    <meta name="application-name" content="FPManager">

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FPManager">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="FPM - Freelance Project Manager - by Alwan">
    <meta property="og:description"
        content="FPM adalah aplikasi manajemen projek freelance untuk membantu mengelola pelanggan, projek, invoice, pembayaran, deadline, dan laporan keuangan secara mudah dan efisien.">
    <meta property="og:locale" content="id_ID">
    <meta property="og:site_name" content="FPManager">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="apple-touch-icon" href="assets/img/favicon.png">
    <!-- Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Global Style -->

    <link rel="stylesheet" href="css/darkmode.css">

    <link rel="manifest" href="manifest.json">


<body class="bg-zinc-100">
    <!-- Global Loader -->
    <div id="globalLoader"
        class="fixed inset-0 z-[9999] bg-zinc-50 flex items-center justify-center transition-opacity duration-500">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-zinc-200 border-t-indigo-600 mb-3"></div>
            <p class="text-zinc-500 font-medium text-sm">Memuat data...</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto py-10 px-6">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">

            <div class="no-print">
                <h1 class="text-3xl font-bold text-zinc-800">
                    Invoice
                </h1>

                <p class="text-zinc-500">
                    Preview Invoice Projek
                </p>
            </div>

            <button onclick="history.back()"
                class="no-print  bg-zinc-700 hover:bg-zinc-800 text-white px-5 py-2 rounded-lg">
                <i class="fa fa-arrow-left mr-2"></i>
                Kembali
            </button>

        </div>

        <!-- Invoice -->

        <div id="invoiceArea" class="bg-white rounded-xl shadow-xl border border-zinc-200 p-10">

            <div class="flex justify-between border-b pb-6">

                <div>

                    <h2 class="text-4xl font-bold text-indigo-600">

                        INVOICE

                    </h2>

                    <p class="mt-4">

                        <b>No Invoice :</b>

                        <span id="previewInvoiceNo">-</span>

                    </p>

                    <p>

                        <b>Tanggal :</b>

                        <span id="previewTanggal">-</span>

                    </p>

                </div>

                <div class="text-right">

                    <h2 class="text-2xl font-bold">

                        FPManager

                    </h2>

                    <p class="text-zinc-500">

                        Indonesia

                    </p>

                </div>

            </div>

            <!-- Customer -->

            <div class="grid grid-cols-2 gap-6 mt-8">

                <div>

                    <h3 class="font-bold text-lg mb-2">

                        Kepada

                    </h3>

                    <p id="previewPelanggan"></p>

                    <p id="previewWA"></p>

                </div>

                <div class="text-right">

                    <p>

                        <b>Status :</b>

                        <span id="previewStatus" class="bg-yellow-500 text-white px-4 py-1 rounded-full">

                        </span>

                    </p>

                    <p class="mt-2">

                        <b>Deadline :</b>

                        <span id="previewDeadline"></span>

                    </p>

                </div>

            </div>

            <!-- Table -->

            <table class="w-full mt-8 border">

                <thead class="bg-indigo-600 text-white">

                    <tr>

                        <th class="p-3">

                            Produk

                        </th>

                        <th>

                            Jumlah

                        </th>

                        <th>

                            Harga

                        </th>

                        <th>

                            Total

                        </th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td class="border p-3" id="previewProduk"></td>

                        <td class="border text-center" id="previewJumlah"></td>

                        <td class="border text-center" id="previewHarga"></td>

                        <td class="border text-center font-bold" id="previewNominal"></td>

                    </tr>

                </tbody>

            </table>

            <!-- Total -->

            <div class="flex justify-end mt-8">

                <table class="w-80">

                    <tr>

                        <td>Total</td>

                        <td class="text-right font-bold" id="previewTotal"></td>

                    </tr>

                    <tr>

                        <td>DP</td>

                        <td class="text-right" id="previewDP"></td>

                    </tr>

                    <tr>

                        <td>Sisa Pembayaran</td>

                        <td class="text-right text-red-600 font-bold" id="previewSisa"></td>

                    </tr>

                </table>

            </div>

            <!-- Catatan -->

            <div class="mt-8">

                <h3 class="font-bold mb-2">

                    Catatan

                </h3>

                <div class="bg-zinc-100 rounded-lg p-4">

                    <span id="previewCatatan">

                        -

                    </span>

                </div>

            </div>

        </div>

        <!-- Action -->

        <div class="grid md:grid-cols-3 gap-5 mt-8 no-print ">

            <button id="btnPDF" class="bg-red-600 hover:bg-red-700 text-white px-6 py-4 rounded-lg font-semibold">

                <i class="fa fa-file-pdf mr-2"></i>

                Download PDF

            </button>

            <button onclick="window.print()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-lg font-semibold">

                <i class="fa fa-print mr-2"></i>

                Print

            </button>

            <button onclick="history.back()"
                class="bg-zinc-700 hover:bg-zinc-800 text-white px-6 py-4 rounded-lg font-semibold">

                <i class="fa fa-arrow-left mr-2"></i>

                Kembali

            </button>

        </div>

    </div>

    <!-- Library PDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Global JS -->
    <script src="js/toast.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>

    <!-- Invoice JS -->
    <script src="js/invoice.js"></script>

    <script src="js/pwa.js"></script>
    <script src="js/theme.js"></script>


</html>
